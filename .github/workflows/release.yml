name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # PyPI trusted publishing (preferred). Set up at
    # https://pypi.org/manage/account/publishing/ — no long-lived token
    # in repo secrets. If the org isn't configured for trusted
    # publishing yet, fall back to UV_PUBLISH_TOKEN via secrets.PYPI_TOKEN.
    environment:
      name: pypi
      url: https://pypi.org/p/upbox
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          PYPROJECT_VERSION=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "release version: $TAG_VERSION"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
