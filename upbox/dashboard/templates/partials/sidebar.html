<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <strong>upbox</strong>
    <small>local proxy audit</small>
  </div>

  <div class="sidebar-section">Dashboard</div>
  <a href="/" class="sidebar-link {% if not selected_tool %}active{% endif %}">
    Live feed
    <span class="shortcut">F</span>
  </a>
  <a href="/settings" class="sidebar-link">Tools</a>
  <a href="/settings" class="sidebar-link">Rules</a>
  <a href="/settings" class="sidebar-link">Audit log</a>
  <a href="/settings" class="sidebar-link">Settings</a>

  <div class="sidebar-section">Tools</div>
  {% for t in tools %}
    {% set ic = icon_for(t['tool']) %}
    <a href="/?tool={{ t['tool'] | urlencode }}"
       class="sidebar-tool {% if selected_tool == t['tool'] %}active{% endif %}">
      <span class="tool-icon tool-icon-sm tool-icon-{{ ic.code }}">{{ ic.monogram }}</span>
      <span>{{ t['tool'] }}</span>
      <span class="count">{{ t['request_count'] }}</span>
    </a>
  {% else %}
    <div class="sidebar-link muted small" style="cursor: default;">No traffic yet</div>
  {% endfor %}
</aside>
