{% set status = current_status or 'all' %}
<a href="/" class="stat-cell {% if status == 'all' %}on{% endif %}" title="Show all requests">
  <div class="lbl">Requests · 24h</div>
  <div class="val">{{ '{:,}'.format(stats['total'] or 0) }}</div>
</a>
<button type="button" class="stat-cell" disabled title="Bytes captured (last 24h)">
  <div class="lbl">Bytes captured</div>
  <div class="val">{{ stats['total_bytes'] | bytes if stats['total_bytes'] is not none else '0 B' }}</div>
</button>
<a href="/?status=redacted" class="stat-cell {% if status == 'redacted' %}on{% endif %}" title="Filter → redacted">
  <div class="lbl">Redacted</div>
  <div class="val warn">{{ stats['redacted'] or 0 }}</div>
</a>
<a href="/?status=blocked" class="stat-cell {% if status == 'blocked' %}on{% endif %}" title="Filter → blocked">
  <div class="lbl">Blocked</div>
  <div class="val bad">{{ stats['blocked'] or 0 }}</div>
</a>
<div class="stats-right">
  <div class="theme-pick" role="group" aria-label="Theme">
    <button type="button" id="theme-dark" class="on" title="Dark theme" aria-label="Dark theme">
      <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true">
        <path d="M6 1a7 7 0 1 0 9 9A6 6 0 0 1 6 1z"/>
      </svg>
    </button>
    <button type="button" id="theme-light" title="Light theme" aria-label="Light theme">
      <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
        <circle cx="8" cy="8" r="3"/>
        <path d="M8 1v1.6M8 13.4V15M1 8h1.6M13.4 8H15M2.8 2.8l1.1 1.1M12.1 12.1l1.1 1.1M2.8 13.2l1.1-1.1M12.1 3.9l1.1-1.1" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <button id="btn-pause" class="btn" type="button" title="Pause the live feed (Space)">
    <span id="pause-label">⏸ Pause</span>
  </button>
  <a class="btn" href="/export" title="Export filtered rows as JSONL">↓ Export</a>
  <span id="live-indicator" class="live">Live</span>
</div>
