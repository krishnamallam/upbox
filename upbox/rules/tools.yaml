# Tool fingerprints for upbox.
#
# Each rule is matched against an HTTPS request as it arrives at the proxy.
# ALL fields under `match` must hold for the rule to match. Rules are
# evaluated top-to-bottom; first match wins. Order matters — specific
# rules (UA + host) MUST come before generic catch-alls (host-only) so
# that, e.g., a Claude-Code-flavored request to api.anthropic.com is
# tagged "Claude Code" and not the generic "Anthropic API".
#
# The unique union of `hosts` across all rules is what upbox sends to
# mitmproxy as the TLS allowlist (Options.allow_hosts). Everything not
# in that list passes through untouched — pinned-cert apps like Outlook
# and banking apps keep working, and the dashboard stays focused on AI
# traffic.
#
# When adding a new tool: prefer the specific (UA-bearing) form first,
# then add a generic host-only catch-all if the tool shares hosts with
# its provider's API.

# --- Specific rules (UA / header + host) ---

- name: Claude Desktop
  match:
    hosts:
      - api.anthropic.com
      - a-api.anthropic.com
      - claude.ai
      - statsig.anthropic.com
    headers: ["x-app: claude-desktop"]

- name: Claude Code
  match:
    ua_contains: ["claude-code", "anthropic-ai/sdk"]
    hosts:
      - api.anthropic.com
      - a-api.anthropic.com
      - claude.ai
      - statsig.anthropic.com
      - console.anthropic.com

